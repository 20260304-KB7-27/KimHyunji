<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script스니펫</title>
  <script>
    window.onload = function () {
        //querySelector
        //주어진 CSS 선택자에 일치하는 첫번째 요소를 선택한다.
      const header = document.querySelector('h1');
      header.style.color = 'orange';

      const header2 = document.querySelector('.classtest');
      header2.style.color = 'red';

      const header3 = document.querySelector('#idtest');
      header3.style.color = 'blue';
        };
  </script>
</head>

<body>
  <h1>Header</h1>
  <h1 class="classtest">Header</h1>
  <h1 id="idtest">Header</h1>
</body>

</html>
