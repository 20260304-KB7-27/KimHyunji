<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        width: 960px;
        margin: 0 auto;
        display: flex;
      }
      #menu {
        width: 260px;
      }
      #section {
        width: 700px;
      }
      @media screen and (max-width: 767px) {
        body {
          width: auto;
          flex-direction: column;
        }
        #menu {
          width: auto;
        }
        #section {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <ul>
        <li>메뉴-A</li>
        <li>메뉴-B</li>
        <li>메뉴-C</li>
      </ul>
    </div>
    <div id="section">
      <h1>Lorem, ipsum.</h1>
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Est quae autem
        optio ea ut facere vero, porro corrupti quis praesentium ratione eaque
        tenetur ipsa adipisci tempore voluptates iure quidem dolores?
      </p>
    </div>
  </body>
</html>
