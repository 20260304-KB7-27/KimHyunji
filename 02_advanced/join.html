<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <table>
                <legend>회원가입</legend>
                <tr>
                    <tr>
                        <th><label for="name">사용자 ID</label></th>
                        <td><input id="name" type="text"></td>
                    </tr>
                        <th><label for="mail">비밀번호</label></th>
                        <td><input id="mail" type="email"></td>
                    </tr>
                    </tr>
                        <th><label for="mail">비밀번호 확인</label></th>
                        <td><input id="mail" type="email"></td>
                    </tr>
                    </tr>
                        <th><label for="mail">이름</label></th>
                        <td><input id="mail" type="email"></td>
                    </tr>
                    <tr>
                    <th>성별</th>
                    <td>
                        <input id="man" type="radio" name="gender" value="m">
                        <label for="man">남자</label>
                        <input id="woman" type="radio" name="gender" value="w">
                        <label for="woman">여자</label>
                    </td>
                    </tr>
                    <tr>
                    <th>취미</th>
                    <td>
                        <input id="soccer" type="checkbox" name="habit" value="s">
                        <label for="soccer">축구</label>
                        <input id="ya" type="checkbox" name="habit" value="y">
                        <label for="ya">야구</label>
                        <input id="bae" type="checkbox" name="habit" value="b">
                        <label for="bae">배구</label>
                        <input id="nong" type="checkbox" name="habit" value="n">
                        <label for="nong">농구</label>
                    </td>
                    </tr>
                    <tr>
                        <th><label for="mail">email</label></th>
                        <td><input id="mail" type="email"></td>
                    </tr>
                    <tr>
                    <th>역할</th>
                    <td>
                        <select>
                            <option>ADMIN</option>
                            <option>관리자</option>
                            <option>일반회원</option>
                        </select>
                    </td>
                    </tr>
                </table>
                <input type="submit" value="확인">
                <input type="submit" value="다시쓰기">
        </fieldset>
    </form>
</body>
</html>
